<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>身份证生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}
.container { width: 100%; max-width: 960px; }

.main-row {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

/* 卡片通用 */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 28px 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  flex: 1;
  min-width: 0;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid #f0f0f0;
}

/* 表单行 */
.form-row {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}
.form-row:last-child { margin-bottom: 0; }
.form-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 14px;
  color: #666;
}
.form-select, .form-input {
  flex: 1 1 0%;
  min-width: 0;
  height: 38px;
  padding: 0 12px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  font-size: 14px;
  color: #333;
  background: #fff;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.form-select:focus, .form-input:focus { border-color: #1677ff; }
.form-select:disabled {
  background: #f5f5f5;
  color: #bbb;
  cursor: not-allowed;
}
.form-select + .form-select { margin-left: 8px; }

/* 生成按钮 */
.btn-generate {
  flex: 1;
  height: 44px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  background: #1677ff;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-generate:hover { background: #4096ff; }
.btn-generate:disabled {
  background: #d9d9d9;
  color: #999;
  cursor: not-allowed;
}
.btn-row {
  display: flex;
  gap: 10px;
}
.btn-random {
  flex: 1;
  height: 44px;
  margin-top: 20px;
  border: 1px solid #d9d9d9;
  border-radius: 8px;
  font-size: 14px;
  color: #666;
  background: #fafafa;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-random:hover {
  border-color: #1677ff;
  color: #1677ff;
  background: #f0f5ff;
}
.hint-address {
  font-size: 12px;
  color: #ff4d4f;
  margin-top: 8px;
  display: none;
}
.hint-address.visible { display: block; }

/* 批量生成 */
.batch-divider {
  border: none;
  border-top: 1px dashed #e8e8e8;
  margin: 20px 0 16px;
}
.batch-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.batch-label {
  font-size: 14px;
  color: #666;
  flex-shrink: 0;
}
.batch-quantity {
  width: 80px;
  height: 36px;
  padding: 0 8px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  font-size: 14px;
  text-align: center;
  outline: none;
}
.batch-quantity:focus { border-color: #1677ff; }
.btn-batch {
  height: 36px;
  padding: 0 16px;
  border: 1px solid #1677ff;
  border-radius: 6px;
  font-size: 14px;
  color: #1677ff;
  background: #fff;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-batch:hover { color: #4096ff; border-color: #4096ff; }
.btn-batch:disabled {
  color: #d9d9d9;
  border-color: #d9d9d9;
  cursor: not-allowed;
}

/* 进度条 */
.progress-bar {
  height: 6px;
  background: #f0f0f0;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: #1677ff;
  border-radius: 3px;
  transition: width 0.15s;
}
.progress-text {
  font-size: 12px;
  color: #999;
  text-align: center;
  margin-top: 4px;
}

/* 字段选择 */
.field-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid #f0f0f0;
  margin-bottom: 16px;
}
.field-checks label {
  font-size: 13px;
  color: #666;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* 批量结果表格 */
.batch-table-wrap {
  max-height: 400px;
  overflow: auto;
  margin-bottom: 16px;
}
.batch-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.batch-table th,
.batch-table td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid #f0f0f0;
  white-space: nowrap;
}
.batch-table th {
  color: #999;
  font-weight: 500;
  background: #fafafa;
  position: sticky;
  top: 0;
}
.batch-table td.id-col {
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 13px;
}
.batch-empty {
  text-align: center;
  color: #bbb;
  padding: 20px 0;
  font-size: 14px;
}

/* 导出按钮 */
.btn-export {
  height: 36px;
  padding: 0 20px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  color: #fff;
  background: #52c41a;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-export:hover { background: #73d13d; }

/* 结果卡片 */
.result-item {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #f5f5f5;
}
.result-item:last-child { border-bottom: none; }
.result-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 14px;
  color: #999;
}
.result-value {
  flex: 1;
  font-size: 15px;
  color: #1a1a1a;
  font-weight: 500;
}
.result-value.id-number {
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  letter-spacing: 2px;
  font-size: 17px;
}

/* 复制按钮 */
.btn-copy {
  flex-shrink: 0;
  padding: 4px 12px;
  font-size: 12px;
  color: #1677ff;
  background: #e6f4ff;
  border: 1px solid #91caff;
  border-radius: 4px;
  cursor: pointer;
  margin-left: 8px;
  transition: all 0.2s;
}
.btn-copy:hover { background: #bae0ff; }
.btn-copy.copied {
  color: #52c41a;
  background: #f6ffed;
  border-color: #b7eb8f;
}

/* 空状态 */
.result-empty {
  text-align: center;
  color: #bbb;
  padding: 24px 0;
  font-size: 14px;
}

/* 免责声明 */
.disclaimer {
  text-align: center;
  color: #999;
  font-size: 12px;
  padding: 0 8px 16px;
  line-height: 1.6;
}

/* 小屏适配 */
@media (max-width: 700px) {
  .main-row {
    flex-direction: column;
  }
}
</style>
</head>
<body>
<div class="container">

  <p class="disclaimer">免责声明：本工具仅用于软件测试、数据模拟等合法用途。生成的身份证号码、姓名均为虚拟数据，请勿用于非法目的。</p>

<div class="main-row">

  <!-- 控制面板 -->
  <div class="card">
    <div class="card-title">选项设置</div>

    <div class="form-row">
      <span class="form-label">性别</span>
      <select id="gender" class="form-select">
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </div>

    <div class="form-row">
      <span class="form-label">出生日期</span>
      <select id="year" class="form-select"></select>
      <select id="month" class="form-select"></select>
      <select id="day" class="form-select"></select>
    </div>

    <div class="form-row">
      <span class="form-label">居住地址</span>
      <select id="province" class="form-select"><option value="">请选择省</option></select>
      <select id="city" class="form-select" disabled><option value="">请选择市</option></select>
      <select id="district" class="form-select" disabled><option value="">请选择区</option></select>
    </div>

    <div class="btn-row">
      <button id="btn-generate" class="btn-generate" disabled>生成身份证</button>
      <button id="btn-random" class="btn-random">随机生成</button>
    </div>
    <p id="hint-address" class="hint-address">请先选择完整地址</p>

    <hr class="batch-divider">
    <div class="batch-row">
      <span class="batch-label">批量生成</span>
      <input type="number" id="batch-count" class="batch-quantity" value="10" min="1">
      <span class="batch-label" style="font-size:13px;color:#999">条</span>
      <button id="btn-batch" class="btn-batch" disabled>批量生成</button>
      <button id="btn-batch-random" class="btn-batch" disabled>随机批量</button>
    </div>
    <div id="batch-progress" style="display:none;margin-top:12px">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 10</div>
    </div>
  </div>

  <!-- 结果卡片 -->
  <div class="card" id="result-card">
    <div class="card-title">生成结果</div>
    <div id="result-container">
      <div class="result-empty">点击按钮生成身份证信息</div>
    </div>

    <div class="field-checks" id="field-checks" style="display:none;margin-top:16px">
      <label><input type="checkbox" class="export-field" value="name" checked>姓名</label>
      <label><input type="checkbox" class="export-field" value="gender" checked>性别</label>
      <label><input type="checkbox" class="export-field" value="ethnicity" checked>民族</label>
      <label><input type="checkbox" class="export-field" value="birth" checked>出生日期</label>
      <label><input type="checkbox" class="export-field" value="address" checked>住址</label>
      <label><input type="checkbox" class="export-field" value="idNumber" checked>身份证号</label>
    </div>

    <div id="batch-table-area" style="display:none">
      <div class="batch-table-wrap">
        <table class="batch-table" id="batch-table">
          <thead><tr></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <button class="btn-export" id="btn-export">导出 JSON</button>
    </div>
  </div>

</div><!-- .main-row -->

</div>

</div>

/* ========== 核心生成逻辑 ========== */

/** 计算身份证第 18 位校验码（GB 11643 / ISO 7064:1983 MOD 11-2） */
function calcChecksum(id17) {
  const weights = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
  const checkMap = ['1', '0', 'X', '9', '8', '7', '6', '5', '4', '3', '2'];
  let sum = 0;
  for (let i = 0; i < 17; i++) { sum += parseInt(id17[i], 10) * weights[i]; }
  return checkMap[sum % 11];
}

/** 生成 3 位顺序码，第 3 位奇偶匹配性别 */
function generateSequenceCode(gender) {
  const prefix = String(Math.floor(Math.random() * 100)).padStart(2, '0');
  const oddDigits = [1, 3, 5, 7, 9];
  const evenDigits = [0, 2, 4, 6, 8];
  const pool = gender === 'male' ? oddDigits : evenDigits;
  const last = pool[Math.floor(Math.random() * pool.length)];
  return prefix + last;
}

/** 根据性别随机生成中文姓名 */
function generateName(gender) {
  const surname = SURNAMES[Math.floor(Math.random() * SURNAMES.length)];
  const namePool = gender === 'male' ? MALE_NAMES : FEMALE_NAMES;
  const count = Math.random() < 0.5 ? 1 : 2;
  let givenName = '';
  const used = new Set();
  for (let i = 0; i < count; i++) {
    let ch;
    do { ch = namePool[Math.floor(Math.random() * namePool.length)]; } while (used.has(ch));
    used.add(ch);
    givenName += ch;
  }
  return surname + givenName;
}

/** 生成完整 18 位身份证号 */
function generateIdNumber(regionCode, birth, gender) {
  const id17 = regionCode + birth + generateSequenceCode(gender);
  return id17 + calcChecksum(id17);
}

/* --- 日期选择器 --- */
const currentYear = new Date().getFullYear();

function isLeapYear(year) {
  return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
}

function getDaysInMonth(year, month) {
  const days = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  if (month === 2 && isLeapYear(year)) return 29;
  return days[month - 1];
}

function initYears() {
  for (let y = currentYear; y >= 1949; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    elYear.appendChild(opt);
  }
}

function initMonths() {
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = String(m).padStart(2, '0');
    elMonth.appendChild(opt);
  }
}

function refreshDays() {
  const year = parseInt(elYear.value, 10);
  const month = parseInt(elMonth.value, 10);
  const selectedDay = elDay.value;
  const maxDay = getDaysInMonth(year, month);
  elDay.innerHTML = '';
  for (let d = 1; d <= maxDay; d++) {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = String(d).padStart(2, '0');
    elDay.appendChild(opt);
  }
  if (selectedDay && parseInt(selectedDay, 10) <= maxDay) { elDay.value = selectedDay; }
}

elYear.addEventListener('change', refreshDays);
elMonth.addEventListener('change', refreshDays);

  const month = String(elMonth.value).padStart(2, '0');
  const day = String(elDay.value).padStart(2, '0');
  const birth = year + month + day;
  const regionCode = elDistrict.value;
  const provinceName = elProvince.value;
  const cityName = elCity.value;
  const districts = REGION_DATA[provinceName].cities[cityName].districts;
  const districtName = Object.keys(districts).find(k => districts[k] === regionCode);
  const fullAddress = provinceName + cityName + districtName;
  const idNumber = generateIdNumber(regionCode, birth, gender);
  const name = generateName(gender);
  const genderText = gender === 'male' ? '男' : '女';

  elResultContainer.innerHTML =
    '<div class="result-item"><span class="result-label">身份证号</span><span class="result-value id-number">' + idNumber + '</span><button class="btn-copy" onclick="copyIdNumber(this,\'' + idNumber + '\')">复制</button></div>' +
    '<div class="result-item"><span class="result-label">姓名</span><span class="result-value">' + name + '</span></div>' +
    '<div class="result-item"><span class="result-label">性别</span><span class="result-value">' + genderText + '</span></div>' +
    '<div class="result-item"><span class="result-label">民族</span><span class="result-value">汉族</span></div>' +
    '<div class="result-item"><span class="result-label">出生日期</span><span class="result-value">' + year + '年' + month + '月' + day + '日</span></div>' +
    '<div class="result-item"><span class="result-label">住址</span><span class="result-value">' + fullAddress + '</span></div>';
  // 切换到单条结果视图
  elResultContainer.style.display = 'block';
  elFieldChecks.style.display = 'none';
  elBatchArea.style.display = 'none';
  batchData = [];
}

elBtnGenerate.addEventListener('click', renderResult);

/* --- 随机生成 --- */
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

elBtnRandom.addEventListener('click', function() {
  // 随机性别
  elGender.value = Math.random() < 0.5 ? 'male' : 'female';

  // 随机出生日期
  elYear.value = 1949 + Math.floor(Math.random() * (currentYear - 1949 + 1));
  elMonth.value = 1 + Math.floor(Math.random() * 12);
  refreshDays();

  // 随机地区
  var provinceNames = Object.keys(REGION_DATA);
  var prov = randomPick(provinceNames);
  elProvince.value = prov;
  onProvinceChange();

  var cityNames = Object.keys(REGION_DATA[prov].cities);
  var city = randomPick(cityNames);
  elCity.value = city;
  onCityChange();

  var districtEntries = Object.entries(REGION_DATA[prov].cities[city].districts);
  var district = randomPick(districtEntries);
  elDistrict.value = district[1]; // 地址码
  onDistrictChange();

  renderResult();
});

/* --- 复制功能 --- */
function copyIdNumber(btn, idNumber) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(idNumber).then(function() { showCopied(btn); }).catch(function() { fallbackCopy(btn, idNumber); });
  } else {
    fallbackCopy(btn, idNumber);
  }
}

function showCopied(btn) {
  btn.textContent = '已复制';
  btn.classList.add('copied');
  setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
}

function fallbackCopy(btn, idNumber) {
  var range = document.createRange();
  var textNode = btn.parentElement.querySelector('.id-number');
  range.selectNodeContents(textNode);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  showCopied(btn);
  setTimeout(function() { sel.removeAllRanges(); }, 1500);
}

initProvinces();
initYears();
initMonths();

elYear.value = '1990';

refreshDays();

elProvince.value = '北京市';

elCity.value = '市辖区';

/* --- 批量生成 --- */

function buildRecord(gender, year, month, day, regionCode, provinceName, cityName) {
  const districts = REGION_DATA[provinceName].cities[cityName].districts;
  const districtName = Object.keys(districts).find(function(k) { return districts[k] === regionCode; });
  const birth = year + month.padStart(2, '0') + day.padStart(2, '0');
  return {
    name: generateName(gender),
    gender: gender === 'male' ? '男' : '女',
    ethnicity: '汉族',
    birth: year + '年' + month + '月' + day + '日',
    address: provinceName + cityName + districtName,
    idNumber: generateIdNumber(regionCode, birth, gender)
  };
}

function renderBatchTable() {
  // 获取用户选中的导出字段
  var checked = document.querySelectorAll('.export-field:checked');
  var fields = [];
  checked.forEach(function(cb) { fields.push(cb.value); });
  if (fields.length === 0) {
    elBatchTable.querySelector('thead tr').innerHTML = '';
    elBatchTable.querySelector('tbody').innerHTML = '<tr><td colspan="1" style="text-align:center;color:#bbb;padding:16px">请至少选择一个导出字段</td></tr>';
    return;
  }

  var fieldLabels = { name:'姓名', gender:'性别', ethnicity:'民族', birth:'出生日期', address:'住址', idNumber:'身份证号' };
  var hl = '';
  fields.forEach(function(f) { hl += '<th>' + fieldLabels[f] + '</th>'; });
  elBatchTable.querySelector('thead tr').innerHTML = hl;

  var tb = '';
  batchData.forEach(function(r) {
    tb += '<tr>';
    fields.forEach(function(f) {
      if (f === 'idNumber') {
        tb += '<td class="id-col">' + r[f] + '</td>';
      } else {
        tb += '<td>' + r[f] + '</td>';
      }
    });
    tb += '</tr>';
  });
  elBatchTable.querySelector('tbody').innerHTML = tb;
}

// 字段 checkbox 变化时刷新表格列
document.querySelectorAll('.export-field').forEach(function(cb) {
  cb.addEventListener('change', function() {
    if (batchData.length > 0) { renderBatchTable(); }
  });
});

elBtnBatch.addEventListener('click', function() {
  var gender = elGender.value;
  var year = elYear.value;
  var month = elMonth.value;
  var day = elDay.value;
  var regionCode = elDistrict.value;
  var provinceName = elProvince.value;
  var cityName = elCity.value;
  var count = parseInt(elBatchCount.value, 10) || 10;
  if (count < 1) count = 1;
  elBatchCount.value = count;

  batchData = [];
  elResultContainer.style.display = 'none';
  elFieldChecks.style.display = 'flex';
  elBatchArea.style.display = 'none';
  elBtnBatch.disabled = true;
  elBtnBatchRandom.disabled = true;
  elBtnGenerate.disabled = true;
  elBtnRandom.disabled = true;
  elBatchProgress.style.display = 'block';
  elProgressFill.style.width = '0%';
  elProgressText.textContent = '0 / ' + count;

  // 同步循环生成，每 50 条刷新一次进度
  var throttle = Math.max(1, Math.floor(count / 100));
  for (var i = 0; i < count; i++) {
    batchData.push(buildRecord(gender, year, month, day, regionCode, provinceName, cityName));
    if ((i + 1) % throttle === 0 || i === count - 1) {
      elProgressFill.style.width = Math.round((i + 1) / count * 100) + '%';
      elProgressText.textContent = (i + 1) + ' / ' + count;
    }
  }
  // 全部完成
  elBatchProgress.style.display = 'none';
  elBatchArea.style.display = 'block';
  elBtnExport.style.display = 'inline-block';
  renderBatchTable();
  elBtnBatch.disabled = false;
  elBtnBatchRandom.disabled = false;
  elBtnGenerate.disabled = false;
  elBtnRandom.disabled = false;
});

/* --- 随机批量生成 --- */
function randomBatchRecord() {
  var gender = Math.random() < 0.5 ? 'male' : 'female';
  var year = String(1949 + Math.floor(Math.random() * (currentYear - 1949 + 1)));
  var month = String(1 + Math.floor(Math.random() * 12));
  var maxDay = getDaysInMonth(parseInt(year, 10), parseInt(month, 10));
  var day = String(1 + Math.floor(Math.random() * maxDay));

  var provinceNames = Object.keys(REGION_DATA);
  var prov = randomPick(provinceNames);
  var cityNames = Object.keys(REGION_DATA[prov].cities);
  var city = randomPick(cityNames);
  var districtEntries = Object.entries(REGION_DATA[prov].cities[city].districts);
  var district = randomPick(districtEntries);

  return buildRecord(gender, year, month, day, district[1], prov, city);
}

elBtnBatchRandom.addEventListener('click', function() {
  var count = parseInt(elBatchCount.value, 10) || 10;
  if (count < 1) count = 1;
  elBatchCount.value = count;

  batchData = [];
  elResultContainer.style.display = 'none';

  elProgressFill.style.width = '0%';
  elProgressText.textContent = '0 / ' + count;

  // 同步循环生成，每 50 条刷新一次进度
  var throttle = Math.max(1, Math.floor(count / 100));
  for (var i = 0; i < count; i++) {
    batchData.push(randomBatchRecord());
    if ((i + 1) % throttle === 0 || i === count - 1) {
      elProgressFill.style.width = Math.round((i + 1) / count * 100) + '%';
      elProgressText.textContent = (i + 1) + ' / ' + count;
    }
  }
  // 全部完成
  elBatchProgress.style.display = 'none';
  elBatchArea.style.display = 'block';

  elBtnBatch.disabled = false;
  elBtnBatchRandom.disabled = false;
  elBtnGenerate.disabled = false;

});

elBtnExport.addEventListener('click', function() {
  var checked = document.querySelectorAll('.export-field:checked');
  var fields = [];
  checked.forEach(function(cb) { fields.push(cb.value); });
  if (fields.length === 0) return;

  var out = batchData.map(function(r) {
    var obj = {};
    fields.forEach(function(f) { obj[f] = r[f]; });
    return obj;
  });

  var now = new Date();
  var ts = now.getFullYear()
    + String(now.getMonth() + 1).padStart(2, '0')
    + String(now.getDate()).padStart(2, '0')
    + 'T'
    + String(now.getHours()).padStart(2, '0')
    + String(now.getMinutes()).padStart(2, '0')
    + String(now.getSeconds()).padStart(2, '0');
  var filename = '身份证-' + ts + '.json';
  var json = JSON.stringify(out, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
});</script>
