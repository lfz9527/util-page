<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>身份证生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}
.container { width: 100%; max-width: 480px; }

/* 卡片通用 */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 28px 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid #f0f0f0;
}

/* 表单行 */
.form-row {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}
.form-row:last-child { margin-bottom: 0; }
.form-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 14px;
  color: #666;
}
.form-select, .form-input {
  flex: 1;
  height: 38px;
  padding: 0 12px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  font-size: 14px;
  color: #333;
  background: #fff;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.form-select:focus, .form-input:focus { border-color: #1677ff; }
.form-select:disabled {
  background: #f5f5f5;
  color: #bbb;
  cursor: not-allowed;
}
.form-select + .form-select { margin-left: 8px; }

/* 生成按钮 */
.btn-generate {
  width: 100%;
  height: 44px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  background: #1677ff;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-generate:hover { background: #4096ff; }
.btn-generate:disabled {
  background: #d9d9d9;
  color: #999;
  cursor: not-allowed;
}
.hint-address {
  font-size: 12px;
  color: #ff4d4f;
  margin-top: 8px;
  display: none;
}
.hint-address.visible { display: block; }

/* 结果卡片 */
.result-item {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #f5f5f5;
}
.result-item:last-child { border-bottom: none; }
.result-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 14px;
  color: #999;
}
.result-value {
  flex: 1;
  font-size: 15px;
  color: #1a1a1a;
  font-weight: 500;
}
.result-value.id-number {
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  letter-spacing: 2px;
  font-size: 17px;
}

/* 复制按钮 */
.btn-copy {
  flex-shrink: 0;
  padding: 4px 12px;
  font-size: 12px;
  color: #1677ff;
  background: #e6f4ff;
  border: 1px solid #91caff;
  border-radius: 4px;
  cursor: pointer;
  margin-left: 8px;
  transition: all 0.2s;
}
.btn-copy:hover { background: #bae0ff; }
.btn-copy.copied {
  color: #52c41a;
  background: #f6ffed;
  border-color: #b7eb8f;
}

/* 空状态 */
.result-empty {
  text-align: center;
  color: #bbb;
  padding: 24px 0;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">

  <!-- 控制面板 -->
  <div class="card">
    <div class="card-title">选项设置</div>

    <div class="form-row">
      <span class="form-label">性别</span>
      <select id="gender" class="form-select">
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </div>

    <div class="form-row">
      <span class="form-label">出生日期</span>
      <select id="year" class="form-select"></select>
      <select id="month" class="form-select"></select>
      <select id="day" class="form-select"></select>
    </div>

    <div class="form-row">
      <span class="form-label">居住地址</span>
      <select id="province" class="form-select"><option value="">请选择省</option></select>
      <select id="city" class="form-select" disabled><option value="">请选择市</option></select>
      <select id="district" class="form-select" disabled><option value="">请选择区</option></select>
    </div>

    <button id="btn-generate" class="btn-generate" disabled>生成身份证</button>
    <p id="hint-address" class="hint-address">请先选择完整地址</p>
  </div>

  <!-- 结果卡片 -->
  <div class="card" id="result-card">
    <div class="card-title">生成结果</div>
    <div id="result-container">
      <div class="result-empty">点击上方「生成身份证」按钮查看结果</div>
    </div>
  </div>

</div>
</body>
</html>
